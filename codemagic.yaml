workflows:
  android-app:
    name: VAYU Agent
    max_build_duration: 15
    instance_type: mac_mini_m2

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx2048m"

    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Generate Gradle Wrapper
        script: |
          # The gradle-wrapper.jar is missing from repo — generate it using system Gradle
          # Codemagic Mac machines have Gradle pre-installed
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Build Debug APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - rinkusharma79346@gmail.com
        notify:
          success: true
          failure: true
