workflows:
  android-app:
    name: VAYU Agent
    max_build_duration: 15
    instance_type: mac_mini_m2

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx2048m"

    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Generate Gradle Wrapper
        script: |
          # Unconditionally generate the wrapper — the repo does not contain gradle-wrapper.jar
          # Gradle is pre-installed on Codemagic macOS machines
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - rinkusharma79346@gmail.com
        notify:
          success: true
          failure: true
