name: Build VAYU APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle Wrapper
        run: |
          # Download gradle wrapper jar if missing
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            GRADLE_VERSION=8.5
            wget -q "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -O gradle/wrapper/gradle-wrapper.jar || \
            curl -sL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar || \
            # Alternative: use gradle wrapper generation
            pip install gradle-wrapper 2>/dev/null || true
          fi
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: |
          # If gradlew still doesn't work, use system gradle to generate wrapper
          if ! ./gradlew assembleDebug 2>/dev/null; then
            gradle wrapper --gradle-version 8.5
            ./gradlew assembleDebug
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VAYU-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
